name: eval-gate

# Runs the offline pre-prod eval gate on every PR / push. Uses the deterministic
# stub backend, so NO GCP credentials are needed. The live Vertex/ADK layers run
# on-demand (manual dispatch) where creds are configured.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  offline-gate:
    runs-on: ubuntu-latest
    env:
      EVAL_BACKEND: stub
      GATE_MODE: full
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (offline deps only)
        run: pip install -e ".[dev]"
      - name: Rebuild golden datasets
        run: python -m evals.datasets.build_datasets
      - name: Unit + judge + gate tests
        run: pytest -q
      - name: Run eval gate
        run: python pipelines/ci_gate.py
      - name: Upload gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-report
          path: reports/
